<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#0f172a" />
  <meta name="description" content="SeniorFlow - control diario de ventas, gastos, caja y cuentas corrientes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <title>SeniorFlow</title>
  <link rel="manifest" href="./manifest.json" />
  <link rel="apple-touch-icon" href="./icons/icon-192.png" />
  <link rel="icon" type="image/png" href="./icons/icon-192.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;700;800&display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['Manrope', 'system-ui', 'sans-serif']
          }
        }
      }
    };
  </script>
  <style>
    body { margin: 0; font-family: Manrope, system-ui, sans-serif; }
    .custom-scrollbar::-webkit-scrollbar { width: 8px; height: 8px; }
    .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 999px; }
    .custom-scrollbar::-webkit-scrollbar-track { background: #f1f5f9; }
    .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
    .scrollbar-hide::-webkit-scrollbar { display: none; }
    .pb-safe { padding-bottom: calc(0.5rem + env(safe-area-inset-bottom)); }

    .animate-in { animation-duration: 220ms; animation-fill-mode: both; }
    .fade-in { animation-name: sfFadeIn; }
    .zoom-in-95 { animation-name: sfZoomIn95; }
    .slide-in-from-top-2 { animation-name: sfSlideInTop; }
    .slide-in-from-bottom-4 { animation-name: sfSlideInBottom; }
    .duration-200 { animation-duration: 200ms; }
    .duration-300 { animation-duration: 300ms; }
    .duration-500 { animation-duration: 500ms; }

    /* Ajuste visual SeniorFlow: evita que la barra de acciones de Ofertas se pise. */
    .sf-offer-toolbar-fixed {
      display: flex !important;
      flex-wrap: wrap !important;
      align-items: stretch !important;
      gap: 0.75rem !important;
      width: 100% !important;
      max-width: 100% !important;
      overflow: visible !important;
    }
    .sf-offer-toolbar-fixed > input,
    .sf-offer-toolbar-fixed > textarea,
    .sf-offer-toolbar-fixed > select {
      flex: 1 1 260px !important;
      min-width: min(100%, 240px) !important;
      max-width: 100% !important;
    }
    .sf-offer-toolbar-fixed > button {
      flex: 0 1 auto !important;
      min-width: auto !important;
      max-width: 100% !important;
      white-space: nowrap !important;
      justify-content: center !important;
      padding-left: 1rem !important;
      padding-right: 1rem !important;
      gap: 0.55rem !important;
    }
    @media (max-width: 1280px) {
      .sf-offer-toolbar-fixed > button {
        font-size: 0.92rem !important;
        padding-left: 0.9rem !important;
        padding-right: 0.9rem !important;
      }
    }
    @media (max-width: 760px) {
      .sf-offer-toolbar-fixed {
        display: grid !important;
        grid-template-columns: repeat(2, minmax(0, 1fr)) !important;
      }
      .sf-offer-toolbar-fixed > input,
      .sf-offer-toolbar-fixed > textarea,
      .sf-offer-toolbar-fixed > select {
        grid-column: 1 / -1 !important;
        width: 100% !important;
      }
      .sf-offer-toolbar-fixed > button {
        width: 100% !important;
        min-height: 3rem !important;
        padding-left: 0.75rem !important;
        padding-right: 0.75rem !important;
      }
      .sf-offer-toolbar-fixed > button[data-sf-action="guardar"] {
        grid-column: 1 / -1 !important;
      }
      .sf-offer-toolbar-fixed > button[data-sf-icon-only="true"] {
        min-width: 3.25rem !important;
        padding-left: 0.75rem !important;
        padding-right: 0.75rem !important;
      }
    }
    @media (max-width: 430px) {
      .sf-offer-toolbar-fixed {
        grid-template-columns: 1fr !important;
      }
      .sf-offer-toolbar-fixed > button[data-sf-action="guardar"] {
        grid-column: auto !important;
      }
    }

    /* Plantilla Pro para ofertas: se aplica solo al flyer generado, no al resto del sistema. */
    .sf-premium-offer-sheet {
      position: relative !important;
      isolation: isolate !important;
      width: min(92vw, 680px) !important;
      min-height: min(163.5vw, 1208px) !important;
      aspect-ratio: 9 / 16 !important;
      margin: 0 auto !important;
      padding: clamp(22px, 4.5vw, 44px) clamp(20px, 4vw, 42px) !important;
      overflow: hidden !important;
      border-radius: 28px !important;
      border: 1px solid rgba(148, 163, 184, 0.28) !important;
      background:
        radial-gradient(circle at 52% 33%, rgba(139, 92, 246, 0.13), transparent 31%),
        radial-gradient(circle at 76% 48%, rgba(14, 165, 233, 0.12), transparent 32%),
        linear-gradient(180deg, #ffffff 0%, #f8fbff 57%, #eef4ff 100%) !important;
      box-shadow: 0 24px 70px rgba(15, 23, 42, 0.12) !important;
      color: #0f172a !important;
    }
    .sf-premium-offer-sheet::before {
      content: '' !important;
      position: absolute !important;
      top: 16px !important;
      left: 18px !important;
      right: 18px !important;
      height: 10px !important;
      border-radius: 999px !important;
      background: linear-gradient(90deg, #7c3aed, #3b82f6, #06b6d4) !important;
      box-shadow: 0 6px 16px rgba(59, 130, 246, 0.18) !important;
      z-index: 2 !important;
    }
    .sf-premium-offer-sheet * {
      box-sizing: border-box !important;
    }
    .sf-premium-offer-sheet h1,
    .sf-premium-offer-sheet h2,
    .sf-premium-offer-sheet h3,
    .sf-premium-offer-sheet [class*="font-bold"] {
      letter-spacing: -0.025em;
    }
    .sf-premium-offer-sheet img {
      max-width: 100% !important;
    }
    .sf-premium-offer-sheet [data-sf-premium-product-zone="true"] {
      position: relative !important;
      overflow: hidden !important;
      border-radius: 26px !important;
      border: 1px solid rgba(148, 163, 184, 0.22) !important;
      background:
        radial-gradient(circle at 47% 42%, rgba(255,255,255,0.98) 0%, rgba(241,245,249,0.85) 34%, rgba(226,232,240,0.54) 68%, rgba(248,250,252,0.94) 100%),
        linear-gradient(135deg, rgba(255,255,255,0.98), rgba(239,246,255,0.98)) !important;
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,0.92),
        0 18px 45px rgba(15, 23, 42, 0.10) !important;
    }
    .sf-premium-offer-sheet [data-sf-premium-product-zone="true"]::before {
      content: '' !important;
      position: absolute !important;
      inset: 9% 10% 22% 10% !important;
      border-radius: 999px !important;
      background: radial-gradient(circle, rgba(139, 92, 246, 0.18), rgba(14, 165, 233, 0.10) 48%, transparent 72%) !important;
      z-index: -1 !important;
    }
    .sf-premium-offer-sheet [data-sf-premium-product-zone="true"]::after {
      content: '' !important;
      position: absolute !important;
      left: 18% !important;
      right: 18% !important;
      bottom: 10% !important;
      height: 28px !important;
      border-radius: 999px !important;
      background: rgba(15, 23, 42, 0.12) !important;
      filter: blur(18px) !important;
      z-index: -1 !important;
    }
    .sf-premium-offer-sheet img[data-sf-premium-product="true"] {
      position: relative !important;
      z-index: 1 !important;
      object-fit: contain !important;
      mix-blend-mode: multiply !important;
      filter: contrast(1.04) saturate(1.04) drop-shadow(0 20px 22px rgba(15, 23, 42, 0.20)) !important;
      transform: translateZ(0) !important;
    }
    .sf-premium-offer-sheet [data-sf-premium-price="true"] {
      border-radius: 20px !important;
      border: 2px solid rgba(124, 58, 237, 0.48) !important;
      background: linear-gradient(135deg, rgba(250, 245, 255, 0.98), rgba(238, 242, 255, 0.98)) !important;
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.85), 0 12px 25px rgba(124, 58, 237, 0.10) !important;
      color: #6d28d9 !important;
    }
    .sf-premium-offer-sheet [data-sf-premium-price="true"] * {
      color: #6d28d9 !important;
    }
    .sf-premium-offer-sheet [data-sf-premium-contact="true"] {
      border-radius: 18px !important;
      border: 1px solid rgba(148, 163, 184, 0.20) !important;
      background: rgba(255, 255, 255, 0.82) !important;
      box-shadow: 0 12px 28px rgba(15, 23, 42, 0.07) !important;
      backdrop-filter: blur(10px) !important;
    }
    .sf-premium-offer-sheet [data-sf-premium-title="true"] {
      color: #0f172a !important;
      font-weight: 900 !important;
      text-wrap: balance !important;
    }
    .sf-premium-offer-sheet [data-sf-premium-subtitle="true"] {
      color: #6d28d9 !important;
      font-weight: 800 !important;
    }
    .sf-premium-offer-sheet [data-sf-premium-specs="true"] {
      color: #64748b !important;
      font-weight: 700 !important;
    }
    @media (max-width: 760px) {
      .sf-premium-offer-sheet {
        width: min(96vw, 520px) !important;
        border-radius: 22px !important;
      }
    }

    @keyframes sfFadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes sfZoomIn95 {
      from { opacity: 0; transform: scale(.95); }
      to { opacity: 1; transform: scale(1); }
    }
    @keyframes sfSlideInTop {
      from { opacity: 0; transform: translateY(-8px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes sfSlideInBottom {
      from { opacity: 0; transform: translateY(16px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @media print {
      @page { size: A4 portrait; margin: 0; }
      html, body {
        width: 210mm;
        margin: 0 !important;
        padding: 0 !important;
        background: #fff !important;
      }
      body {
        -webkit-print-color-adjust: exact;
        print-color-adjust: exact;
      }
      .print-modal-root {
        position: static !important;
        inset: auto !important;
        display: block !important;
        overflow: visible !important;
        height: auto !important;
        margin: 0 !important;
        padding: 0 !important;
        background: #fff !important;
      }
      .print-modal-pages {
        width: 210mm !important;
        max-width: 210mm !important;
        display: block !important;
        margin: 0 auto !important;
      }
      .print-modal-pages > * {
        margin: 0 !important;
      }
      .print-a4-sheet {
        display: block !important;
        width: 210mm !important;
        max-width: 210mm !important;
        min-height: 297mm !important;
        box-sizing: border-box !important;
        margin: 0 auto !important;
        padding: 8mm 10mm !important;
        break-after: page;
        page-break-after: always;
      }
      .print-a4-sheet:last-child {
        break-after: auto;
        page-break-after: auto;
      }
      .print-no-break { break-inside: avoid-page; page-break-inside: avoid; }
    }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="module" src="./app.js?v=seniorflow-react-20260424-82"></script>
  <script>
    (() => {
      const ACCIONES_OFERTA = {
        'LIMPIAR SELECCIÓN': { corto: 'LIMPIAR', movil: 'LIMPIAR', accion: 'limpiar' },
        'CANCELAR': { corto: 'CANCELAR', movil: 'CANCELAR', accion: 'cancelar' },
        'GUARDAR OFERTA': { corto: 'GUARDAR', movil: 'GUARDAR', accion: 'guardar' },
        'PREVISUALIZAR': { corto: 'VISTA', movil: '', accion: 'vista', iconoMovil: true },
        'COMPARTIR IMAGEN': { corto: 'COMPARTIR', movil: '', accion: 'compartir', iconoMovil: true }
      };
      const normalizar = (texto) => (texto || '').replace(/\s+/g, ' ').trim().toUpperCase();
      const obtenerAccion = (boton) => {
        const texto = normalizar(boton.dataset.sfTextoOriginal || boton.textContent);
        return Object.keys(ACCIONES_OFERTA).find((clave) => texto.includes(clave));
      };
      const tieneIcono = (boton) => Boolean(boton.querySelector('svg'));
      const aplicarTextoBoton = (boton, config) => {
        const texto = window.innerWidth <= 760 && config.iconoMovil && tieneIcono(boton) ? config.movil : config.corto;
        boton.dataset.sfAction = config.accion;
        boton.dataset.sfIconOnly = texto ? 'false' : 'true';
        boton.setAttribute('title', boton.dataset.sfTextoOriginal || config.corto);
        boton.setAttribute('aria-label', boton.dataset.sfTextoOriginal || config.corto);

        const nodosTexto = Array.from(boton.childNodes).filter((nodo) => nodo.nodeType === Node.TEXT_NODE);
        if (nodosTexto.length) {
          nodosTexto.forEach((nodo, indice) => {
            nodo.textContent = indice === nodosTexto.length - 1 && texto ? ` ${texto}` : '';
          });
          if (!texto) boton.classList.add('px-3');
          return;
        }

        const spanExistente = boton.querySelector('[data-sf-label="true"]');
        if (spanExistente) {
          spanExistente.textContent = texto;
          spanExistente.style.display = texto ? '' : 'none';
          return;
        }

        if (texto) {
          const span = document.createElement('span');
          span.dataset.sfLabel = 'true';
          span.textContent = texto;
          boton.appendChild(span);
        }
      };
      const ajustarBarraOfertas = () => {
        const botones = Array.from(document.querySelectorAll('button'));
        const botonesOferta = botones.filter((boton) => obtenerAccion(boton));
        const grupos = new Map();

        botonesOferta.forEach((boton) => {
          const clave = obtenerAccion(boton);
          if (!boton.dataset.sfTextoOriginal) boton.dataset.sfTextoOriginal = normalizar(boton.textContent);
          const config = ACCIONES_OFERTA[clave];
          aplicarTextoBoton(boton, config);

          const padre = boton.parentElement;
          if (!padre) return;
          const lista = grupos.get(padre) || [];
          lista.push(boton);
          grupos.set(padre, lista);
        });

        grupos.forEach((lista, padre) => {
          const acciones = new Set(lista.map((boton) => boton.dataset.sfAction));
          if (acciones.size >= 3 && (acciones.has('guardar') || acciones.has('compartir') || acciones.has('vista'))) {
            padre.classList.add('sf-offer-toolbar-fixed');
          }
        });
      };

      const ejecutar = () => requestAnimationFrame(ajustarBarraOfertas);
      window.addEventListener('resize', ejecutar, { passive: true });
      window.addEventListener('load', ejecutar);
      const observer = new MutationObserver(ejecutar);
      observer.observe(document.documentElement, { childList: true, subtree: true });
      ejecutar();
    })();
  </script>
  <script>
    (() => {
      const normalizar = (texto) => (texto || '').replace(/\s+/g, ' ').trim().toUpperCase();
      const esHojaOferta = (elemento) => {
        const texto = normalizar(elemento.textContent || '');
        return texto.includes('OFERTAS ESPECIALES') && (texto.includes('PRECIO OFERTA') || texto.includes('VIGENCIA'));
      };
      const elegirCandidatoHoja = () => {
        const candidatos = Array.from(document.querySelectorAll('.print-a4-sheet, .print-modal-pages > *, [class*="print-a4"]'));
        return candidatos.filter(esHojaOferta);
      };
      const contienePrecio = (texto = '') => /\$\s*\d/.test(texto.replace(/\s+/g, ' '));
      const marcarTextoPorContenido = (hoja, patrones, atributo) => {
        const nodos = Array.from(hoja.querySelectorAll('h1,h2,h3,p,span,div,strong'));
        nodos.forEach((nodo) => {
          const texto = normalizar(nodo.textContent || '');
          if (!texto || texto.length > 220) return;
          if (patrones.some((patron) => texto.includes(patron))) nodo.dataset[atributo] = 'true';
        });
      };
      const marcarPrecio = (hoja) => {
        const nodos = Array.from(hoja.querySelectorAll('div,section,article,p,span,strong'));
        const precio = nodos.find((nodo) => contienePrecio(nodo.textContent || '') && normalizar(nodo.textContent || '').length < 80);
        if (!precio) return;
        const contenedor = precio.closest('div') || precio;
        contenedor.dataset.sfPremiumPrice = 'true';
      };
      const marcarImagenesProducto = (hoja) => {
        const imagenes = Array.from(hoja.querySelectorAll('img')).filter((img) => {
          const rect = img.getBoundingClientRect();
          const grandePorVista = rect.width >= 120 || rect.height >= 120;
          const grandePorArchivo = (img.naturalWidth || 0) >= 220 || (img.naturalHeight || 0) >= 220;
          return grandePorVista || grandePorArchivo;
        });
        imagenes.slice(0, 3).forEach((img) => {
          img.dataset.sfPremiumProduct = 'true';
          const padre = img.parentElement;
          if (padre) {
            padre.dataset.sfPremiumProductZone = 'true';
            padre.style.position = padre.style.position || 'relative';
            padre.style.zIndex = padre.style.zIndex || '1';
          }
        });
      };
      const marcarFooterContacto = (hoja) => {
        const nodos = Array.from(hoja.querySelectorAll('div,section,footer,p'));
        const contacto = nodos.find((nodo) => {
          const texto = normalizar(nodo.textContent || '');
          return texto.includes('WHATSAPP') || texto.includes('CORREO') || texto.includes('WEB:');
        });
        if (contacto) (contacto.closest('div') || contacto).dataset.sfPremiumContact = 'true';
      };
      const aplicarPlantillaPremium = () => {
        elegirCandidatoHoja().forEach((hoja) => {
          if (hoja.dataset.sfPremiumApplied === 'true') return;
          hoja.dataset.sfPremiumApplied = 'true';
          hoja.classList.add('sf-premium-offer-sheet');

          marcarImagenesProducto(hoja);
          marcarPrecio(hoja);
          marcarFooterContacto(hoja);
          marcarTextoPorContenido(hoja, ['ALUMBRADO', 'PÚBLICO', 'PUBLICO', 'LED', 'LÁMPARA', 'LAMPARA'], 'sfPremiumTitle');
          marcarTextoPorContenido(hoja, ['LUZ FRÍA', 'LUZ FRIA', 'LMS', 'BAEL', '6500K'], 'sfPremiumSubtitle');
          marcarTextoPorContenido(hoja, ['LÚMENES', 'LUMENES', 'IP65', 'ALIMENTACIÓN', 'ALIMENTACION', 'HS'], 'sfPremiumSpecs');
        });
      };
      const ejecutar = () => requestAnimationFrame(aplicarPlantillaPremium);
      window.addEventListener('load', ejecutar);
      window.addEventListener('resize', ejecutar, { passive: true });
      const observer = new MutationObserver(ejecutar);
      observer.observe(document.documentElement, { childList: true, subtree: true, characterData: true });
      ejecutar();
    })();
  </script>
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('./sw.js?v=seniorflow-react-20260424-84').catch((error) => {
          console.error('SW register error', error);
        });
      });
    }
  </script>
</body>
</html>
