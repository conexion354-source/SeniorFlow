<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#0f172a" />
  <meta name="description" content="SeniorFlow - control diario de ventas, gastos, caja y cuentas corrientes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <title>SeniorFlow</title>
  <link rel="manifest" href="./manifest.json" />
  <link rel="apple-touch-icon" href="./icons/icon-192.png" />
  <link rel="icon" type="image/png" href="./icons/icon-192.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;700;800&display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['Manrope', 'system-ui', 'sans-serif']
          }
        }
      }
    };
  </script>
  <style>
    body { margin: 0; font-family: Manrope, system-ui, sans-serif; }
    .custom-scrollbar::-webkit-scrollbar { width: 8px; height: 8px; }
    .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 999px; }
    .custom-scrollbar::-webkit-scrollbar-track { background: #f1f5f9; }
    .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
    .scrollbar-hide::-webkit-scrollbar { display: none; }
    .pb-safe { padding-bottom: calc(0.5rem + env(safe-area-inset-bottom)); }

    .animate-in { animation-duration: 220ms; animation-fill-mode: both; }
    .fade-in { animation-name: sfFadeIn; }
    .zoom-in-95 { animation-name: sfZoomIn95; }
    .slide-in-from-top-2 { animation-name: sfSlideInTop; }
    .slide-in-from-bottom-4 { animation-name: sfSlideInBottom; }
    .duration-200 { animation-duration: 200ms; }
    .duration-300 { animation-duration: 300ms; }
    .duration-500 { animation-duration: 500ms; }

    @keyframes sfFadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes sfZoomIn95 {
      from { opacity: 0; transform: scale(.95); }
      to { opacity: 1; transform: scale(1); }
    }
    @keyframes sfSlideInTop {
      from { opacity: 0; transform: translateY(-8px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes sfSlideInBottom {
      from { opacity: 0; transform: translateY(16px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @media print {
      @page { size: A4 portrait; margin: 0; }
      html, body {
        width: 210mm;
        margin: 0 !important;
        padding: 0 !important;
        background: #fff !important;
      }
      body {
        -webkit-print-color-adjust: exact;
        print-color-adjust: exact;
      }
      .print-a4-sheet {
        width: 210mm !important;
        max-width: 210mm !important;
        min-height: 297mm !important;
        box-sizing: border-box !important;
        margin: 0 auto !important;
        padding: 8mm 10mm !important;
        break-after: page;
        page-break-after: always;
      }
      .print-a4-sheet:last-child {
        break-after: auto;
        page-break-after: auto;
      }
      .print-no-break { break-inside: avoid-page; page-break-inside: avoid; }
    }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="module" src="./app.js?v=seniorflow-react-20260422-47"></script>
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('./sw.js?v=seniorflow-react-20260422-47').catch((error) => {
          console.error('SW register error', error);
        });
      });
    }
  </script>
</body>
</html>
